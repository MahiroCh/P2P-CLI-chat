[package]
name = "hse_p2p_chat"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "chat-daemon"
path = "src/daemon_main.rs"

[[bin]]
name = "chat-cli"
path = "src/cli_main.rs"

[dependencies]
iroh = "0.96"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
thiserror = "1"
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
opt-level = 3
lto = true
